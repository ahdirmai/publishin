services:

  # ─── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: publishin_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap:/var/www/html/bootstrap/cache
    networks:
      - publishin
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env

  # ─── Web Server ───────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: publishin_nginx
    restart: unless-stopped
    ports:
      - "8003:80"
    volumes:
      - .:/var/www/html
      - app_storage:/var/www/html/storage
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    entrypoint: ["/bin/sh", "-c", "ln -sf /var/www/html/storage/app/public /var/www/html/public/storage; exec nginx -g 'daemon off;'"]
    networks:
      - publishin
    depends_on:
      - app

  # ─── MySQL (separate container, persistent external volume) ───────────────────
  mysql:
    image: mysql:8.0
    container_name: publishin_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-publishin}
      MYSQL_USER: ${DB_USERNAME:-publishin}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/publishin.cnf:ro
    networks:
      - publishin
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── phpMyAdmin ──────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: publishin_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    ports:
      - "8004:80"
    networks:
      - publishin
    depends_on:
      mysql:
        condition: service_healthy

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: publishin_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - publishin

  # ─── Queue Worker ─────────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: publishin_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --queue=publishing,analytics,ai,reports,notifications,webhooks,default --tries=3 --timeout=90 --sleep=3
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap:/var/www/html/bootstrap/cache
    networks:
      - publishin
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env

  # ─── Scheduler ───────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: publishin_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap:/var/www/html/bootstrap/cache
    networks:
      - publishin
    depends_on:
      mysql:
        condition: service_healthy
    env_file: .env

  # ─── WebSocket (Reverb) ───────────────────────────────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: publishin_reverb
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap:/var/www/html/bootstrap/cache
    networks:
      - publishin
    depends_on:
      - app
    env_file: .env

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  app_bootstrap:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  publishin:
    driver: bridge
